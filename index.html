// ---------- Helpers ----------
function getStatusClass(s) {
  const st = String(s||'').trim().toUpperCase();
  return ["DL","RE","AL","PA","SL","TH","AH","PC","QH","RD","RI","MD","MI","IN","DM","RV","TR","ID"].includes(st) ? st : 'default';
}
function normalizeCentreName(raw) {
  if (!raw) return raw;
  const r = String(raw).trim();
  const norm = r.replace(/\s+/g,' ').toUpperCase();
  if (/(COLOMBE.*SAINTE|SAINTE.*COLOMBE|COLOMBE,\s*SAINTE)/.test(norm)) return 'Sainte-Colombe';
  return raw;
}

const stationRefs = {};

const iconOrange = makeStationIcon('#ff9800');

        <text x="16" y="25" text-anchor="middle" fill="#fff" font-size="22" font-weight="bold">!</text>
      </svg>

function makeItvIconIsere(id) {

// ---------- Map init ----------
let map;
function initMap() {
  map = L.map('map');
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution:'© OpenStreetMap contributors' }).addTo(map);

  stations.forEach(s=>{
    const link = `<a href="#" class="popup-caserne" data-name="${s.nom}">CT ${s.nom}</a>`;
    const m = L.marker([s.lat,s.lng], { icon: iconRed }).addTo(map).bindPopup(link);
    stationMarkers[s.nom] = m;
  });

  map.on('popupopen', e=>{
    const el = e.popup.getElement();
    const linkC = el.querySelector('.popup-caserne');
    if (linkC) linkC.onclick = ev=>{ ev.preventDefault(); openCaserne(linkC.dataset.name); };
    const linkI = el.querySelector('.popup-interv');
    if (linkI) linkI.onclick = ev=>{ ev.preventDefault(); openIntervention(linkI.dataset.id); };
  });

  map.fitBounds(L.latLngBounds(stations.map(s=>[s.lat,s.lng])), { padding:[50,50] });
}

// ---------- Geocoding ----------
function geocodeNominatim(address) {
  if (!address || !address.trim()) return Promise.resolve(null);
  const q = encodeURIComponent(address);
  const url = `https://nominatim.openstreetmap.org/search?format=json&limit=1&countrycodes=fr&q=${q}`;
  return fetch(url, { headers:{ 'Accept-Language':'fr' } })
    .then(r=> r.ok ? r.json() : [])
    .then(res=> {
      if (!res || !res.length) return null;
      const lat = parseFloat(res[0].lat), lon = parseFloat(res[0].lon);
      if (isNaN(lat) || isNaN(lon)) return null;
      return { lat, lon, display_name: res[0].display_name, raw: res[0] };
    }).catch(()=>null);
}

async function trySmartGeocode(rawAddr) {
  if (!rawAddr) return null;
  const addr = String(rawAddr).trim();

  const pkMatch = addr.match(/(?:\bPK\b|\bPk\b|\bP\.K\.|\bPoint\s+Kilom[eé]trique\b).*?(\d{1,4})/i);
  if (pkMatch) {
    const autorouteMatch = addr.match(/\bA\d{1,2}\b/i);
    const autoroute = autorouteMatch ? autorouteMatch[0] : '';
    const parts = addr.split(',').map(s=>s.trim()).filter(Boolean);
    const commune = parts.length ? parts[parts.length-1] : '';
    const pkNum = pkMatch[1];
    const candidates = [];
    if (autoroute && commune) candidates.push(`${autoroute} PK ${pkNum} ${commune} France`);
    if (autoroute) candidates.push(`${autoroute} PK ${pkNum} France`);
    if (commune) candidates.push(`${commune} PK ${pkNum} France`);
    for (const c of candidates) {
      const r = await geocodeNominatim(c);
      if (r) return { ...r, _matchedInput:c, _pk:pkNum, _autoroute:autoroute, _method:'pk' };
    }
  }

  let r = await geocodeNominatim(addr);
  if (r) return { ...r, _matchedInput:addr, _method:'direct' };

  const parts = addr.split(',').map(p=>p.trim()).filter(Boolean);
  for (let i=0;i<parts.length;i++){
    const candidate = parts.slice(0, parts.length - i).join(', ');
    if (!candidate) continue;
    r = await geocodeNominatim(candidate);
    if (r) return { ...r, _matchedInput:candidate, _method:'prefix' };
  }

  const cleaned = parts.filter(p => p.length > 3 && !/^(Saint|St|Sainte)$/i.test(p)).join(', ');
  if (cleaned && cleaned !== addr) {
    r = await geocodeNominatim(cleaned);
    if (r) return { ...r, _matchedInput:cleaned, _method:'cleaned' };
  }

  if (parts.length) {
    r = await geocodeNominatim(parts[parts.length-1]);
    if (r) return { ...r, _matchedInput:parts[parts.length-1], _method:'commune' };
  }
  return null;
}

// ---------- Popup HTML builder (NO intervention number inside popup) ----------
function buildPopupHtml(id, title, displayAddr, grouped) {
  // Removed the N°{id} line from popup content; the number remains shown above the marker (icon)
  let html = `<a href="#" class="popup-interv" data-id="${id}"><strong>${title}</strong></a>`;
  if (displayAddr) html += `<p style="margin:6px 0 4px 0;">${displayAddr}</p>`;
  if (grouped && Object.keys(grouped).length) {
    html += `<div style="margin-top:8px;">`;
    Object.entries(grouped).forEach(([centre, vehs])=>{
      html += `<div class="interv-detail"><div style="font-weight:bold;">${centre} :</div><div class="vehicles-row">`;
      html += vehs.map(v=>`<div class="vehicle ${getStatusClass(v.status)}">${v.code}</div>`).join('');
      html += `</div></div>`;
    });
    html += `</div>`;
  }
  return html;
}

// ---------- Marker management ----------
function createOrUpdateInterventionMarker(kind, id, lat, lon, displayAddr, grouped) {
  const dict = (kind === 'isere') ? interventionMarkersIsere : interventionMarkersRhône;
  const icon = (kind === 'isere') ? makeItvIconIsere(id) : makeItvIconRhône(id);

  if (displayAddr) interventionDisplayAddress[id] = displayAddr;
  if (lat && lon) interventionGeoCache[id] = { lat, lon, display_name: displayAddr || (interventionGeoCache[id] && interventionGeoCache[id].display_name) || '' };
  let useLat = lat, useLon = lon;
  if ((!useLat || !useLon) && interventionGeoCache[id]) { useLat = interventionGeoCache[id].lat; useLon = interventionGeoCache[id].lon; }
  if (grouped && Object.keys(grouped).length) interventionGroupsPending[id] = grouped;

  if (!useLat || !useLon) {
    if (dict[id]) { dict[id].remove(); delete dict[id]; }
    return null;
  }

  const popupAddr = interventionDisplayAddress[id] || (interventionGeoCache[id] && interventionGeoCache[id].display_name) || '';
  const popupGroups = interventionGroupsPending[id] || grouped || {};
  const title = (interventionDataIsere[id]?.dhDebutInter || interventionDataRhône[id]?.createdAt || '') + ' - ' + (interventionDataIsere[id]?.sinistreCourant || interventionDataRhône[id]?.motif || interventionDataIsere[id]?.sinistreCourant || '');
  const popupHtml = buildPopupHtml(id, title, popupAddr, popupGroups);

  if (dict[id]) {
    dict[id].setLatLng([useLat, useLon]);
    if (dict[id].getPopup()) dict[id].getPopup().setContent(popupHtml);
    return dict[id];
  } else {
    const mk = L.marker([useLat, useLon], { icon }).addTo(map).bindPopup(popupHtml);
    dict[id] = mk;
    return mk;
  }
}

// ---------- Build groups for Rhône ----------
function buildGroupFromRhône(itv) {
  const grouped = {};
  const vehs = itv.vehicules || {};
  Object.keys(vehs).sort((a,b)=>parseInt(a,10)-parseInt(b,10)).forEach(k=>{
    const obj = vehs[k];
    if (!obj || typeof obj === 'string') return;
    Object.entries(obj).forEach(([centreName, engObj])=>{
      const displayCentre = normalizeCentreName(centreName);
      if (!grouped[displayCentre]) grouped[displayCentre] = [];
      if (typeof engObj === 'object') {
        Object.entries(engObj).forEach(([enginName, engData])=>{
          const status = engData && (engData.Statut ?? engData.statut ?? engData.status) ? (engData.Statut ?? engData.statut ?? engData.status) : '';
          grouped[displayCentre].push({ code: enginName, status: String(status||'').trim() });
          engagedMap[`${displayCentre}_${enginName}`] = itv.id || itv._id || null;
        });
      }
    });
  });
  return grouped;
}

// ---------- Casernes realtime listeners ----------
stations.forEach(s=>{
  if (s.nom === "Vienne" || s.nom === "Chasse-sur-Rhône") {
    centreRefs[s.nom] = db.ref(`Isère/Centre/${s.nom}`);
    centreRefs[s.nom].on('value', snap=>{
      centreData[s.nom] = snap.val() || {};
      updateIcon(s.nom);
      refreshCaserneSynoptic(s.nom);
    });
  } else {
    const path = (s.nom === 'Sainte-Colombe') ? 'CIS/Ste-Colombe/Engins' : `CIS/${s.nom}/Engins`;
    stationRefs[s.nom] = db.ref(path);
    stationRefs[s.nom].on('value', snap=>{
      stationData[s.nom] = snap.val() || {};
      updateIcon(s.nom);
      refreshCaserneSynoptic(s.nom);
    });
  }
});

// ---------- Icon updates ----------
function updateDefaultIcon(name) {
  const data = stationData[name]||{};
  const down = Object.entries(data).filter(([_,st])=>String(st).trim().toUpperCase()==='DL').map(([n])=>n);
  let ic = iconRed;
  if (down.length>1 && down.some(v=>v.startsWith('VSAV'))) ic = iconGreen;
  else if (down.length>1) ic = iconOrange;
  stationMarkers[name]?.setIcon(ic);
}
function updateVienneIcon() {
  const d = centreData['Vienne']||{};
  const vs = ['VSAV 01','VSAV 02','VSAV 03'].map(c=> (d[c]||'').toUpperCase());
  const anyAvail = vs.some(s=>['DL','RD'].includes(s));
  if (anyAvail) stationMarkers['Vienne']?.setIcon(iconGreen);
  else {
    const [en,di] = (d['Personnel']||'0/0').split('/').map(n=>parseInt(n,10));
    const avail = di - en;
    stationMarkers['Vienne']?.setIcon(avail < 3 ? iconRed : iconOrange);
  }
}
function updateChasseIcon() {
  const st = (centreData['Chasse-sur-Rhône']?.['VSAV 01']||'').toUpperCase();
  const engaged = !['DL','RD'].includes(st);
  stationMarkers['Chasse-sur-Rhône']?.setIcon(engaged ? iconRed : iconOrange);
}
function updateIcon(name) {
  if (name==='Vienne') updateVienneIcon();
  else if (name==='Chasse-sur-Rhône') updateChasseIcon();
  else updateDefaultIcon(name);
}

// ---------- Casernes UI (show ALL engins, except filtered for Vienne) ----------
const synMap = {};
function initCasernesList() {
  casernesDiv.innerHTML = '';
  stations.slice().sort((a,b)=>a.nom.localeCompare(b.nom)).forEach(s=>{
    const item = document.createElement('div'); item.className='station-item'; item.textContent=s.nom; item.dataset.name=s.nom; casernesDiv.appendChild(item);
    const syn = document.createElement('div'); syn.className='synoptic hidden'; casernesDiv.appendChild(syn);
    synMap[s.nom] = syn;
    item.onclick = ()=> togglePopulateSynoptic(s.nom, syn);
  });
}
function togglePopulateSynoptic(name, syn) {
  if (syn.classList.contains('hidden')) { populateCaserneSynoptic(name, syn); syn.classList.remove('hidden'); }
  else syn.classList.add('hidden');
}
function populateCaserneSynoptic(name, syn) {
  syn.innerHTML = '';

  // pick source node
  let dataObj = {};
  if (name === 'Vienne') dataObj = centreData['Vienne'] || {};
  else if (name === 'Chasse-sur-Rhône') dataObj = centreData['Chasse-sur-Rhône'] || {};
  else dataObj = stationData[name] || {};

  // categories to display first if defined
  let catsToUse = null;
  if (name === 'Condrieu') catsToUse = categories;
  else if (name === 'Vienne') catsToUse = categoriesVienne;
  else if (name === 'Chasse-sur-Rhône') catsToUse = categoriesChasse;
  else if (name === 'Sainte-Colombe') {
    catsToUse = {
      "Secours à Personne":["VSAV 01"],
      "Incendie":["FPTL 01","CCFM 01"],
      "Opérations Diverses":["VFI 01","VTUTP 01"],
      "Commandement":["VLCDG 01"],
      "Secours Nautiques":["BMS 01","R2BLS 01"],
      "Remorque Cellule Lot":["LBACHE 01","LBALIS 01","LCTHER 01","LDNOY 01","LECLE 01","LTRON 01"]
    };
  }

  function makeVehicleBox(keyName, status) {
    const v = document.createElement('div');
    v.className = `vehicle ${getStatusClass(status)}`;
    v.textContent = keyName;
    return v;
  }

  const shown = new Set();

  if (catsToUse) {
    Object.entries(catsToUse).forEach(([cat, list])=>{
      const sec = document.createElement('div'); sec.className='category-section';
      const title = document.createElement('div'); title.className='category-title'; title.textContent=cat; sec.appendChild(title);
      const row = document.createElement('div'); row.className='vehicles-row';
      list.forEach(keyName=>{
        let st = '';
        if (dataObj && dataObj[keyName] !== undefined) {
          const val = dataObj[keyName];
          if (val && typeof val === 'object') st = val.Statut ?? val.statut ?? val.status ?? '';
          else if (typeof val === 'string') st = val;
        }
        row.appendChild(makeVehicleBox(keyName, st));
        shown.add(keyName);
      });
      sec.appendChild(row); syn.appendChild(sec);
    });
  }

  // show all other keys present under the node
  const rawExtraKeys = Object.keys(dataObj || {}).filter(k => !shown.has(k)).sort((a,b) => a.localeCompare(b, undefined, {numeric:true, sensitivity:'base'}));
  let extraKeys = rawExtraKeys;
  if (name === 'Vienne') {
    const excluded = new Set(['Personnel','Ratio']);
    extraKeys = rawExtraKeys.filter(k => !excluded.has(k));
  }

  if (name !== 'Vienne' && extraKeys.length) {
    const sec = document.createElement('div'); sec.className='category-section';
    const title = document.createElement('div'); title.className='category-title'; title.textContent='Autres engins / Attributs'; sec.appendChild(title);
    const row = document.createElement('div'); row.className='vehicles-row';
    extraKeys.forEach(keyName=>{
      let st = '';
      try {
        const val = dataObj[keyName];
        if (val && typeof val === 'object') st = val.Statut ?? val.statut ?? val.status ?? '';
        else if (typeof val === 'string') st = val;
      } catch (e) { st = ''; }
      row.appendChild(makeVehicleBox(keyName, st));
    });
    sec.appendChild(row); syn.appendChild(sec);
  }

  if ((!catsToUse || Object.keys(catsToUse).length === 0) && extraKeys.length === 0) {
    const p = document.createElement('div'); p.style.padding='10px'; p.style.color='#666'; p.textContent='Aucun engin enregistré pour cette caserne.'; syn.appendChild(p);
  }
}
function refreshCaserneSynoptic(name) {
  const syn = synMap[name];
  if (!syn) return;
  if (!syn.classList.contains('hidden')) populateCaserneSynoptic(name, syn);
}

// ---------- Interventions list, realtime and marker sync ----------
function subscribeInterventionsList() {
  intervsDiv.innerHTML = '';
  db.ref('Interventions').off();
  db.ref('Isère/Interventions').off();

  Promise.all([ db.ref('Interventions').once('value'), db.ref('Isère/Interventions').once('value') ])
    .then(([snapR, snapI])=>{
      const rVal = snapR.val() || {};
      const iVal = snapI.val() || {};

      Object.entries(rVal).forEach(([id, itv])=>{
        const it = itv || {}; it.id = id;
        const grouped = buildGroupFromRhône(it);
        const time = it.createdAt || it.dhDebutInter || '';
        const motif = it.motif || it.sinistreCourant || '';
        const address = it.adresse || it.Adresse || '';
        upsertListItem(id, 'rhone', time, motif, address, grouped);
        upsertRhôneIntervention(id, it);
      });

      Object.entries(iVal).forEach(([id, itv])=>{
        const it = itv || {};
        const time = it.dhDebutInter || it.createdAt || '';
        const motif = it.sinistreCourant || '';
        const address = it.Adresse || '';
        db.ref(`Isère/Interventions/${id}/Engins Engagés`).once('value').then(esnap=>{
          const engOrdered = esnap.val() || {};
          const groups = {};
          Object.keys(engOrdered).sort((a,b)=>parseInt(a,10)-parseInt(b,10)).forEach(orderKey=>{
            const centresObj = engOrdered[orderKey] || {};
            Object.entries(centresObj).forEach(([centreName, enginsObj])=>{
              const displayCentre = normalizeCentreName(centreName);
              if (!groups[displayCentre]) groups[displayCentre] = [];
              Object.entries(enginsObj || {}).forEach(([enginName, engData])=>{
                const statut = engData && (engData.Statut ?? engData.statut ?? engData.status) ? (engData.Statut ?? engData.statut ?? engData.status) : '';
                groups[displayCentre].push({ code: enginName, status: String(statut||'').trim() });
                engagedMap[`${displayCentre}_${enginName}`] = id;
              });
            });
          });
          upsertListItem(id, 'isere', time, motif, address, groups);
          interventionGroupsPending[id] = groups;
          upsertIsereIntervention(id, it);
        }).catch(e=>{
          upsertListItem(id, 'isere', time, motif, address, {});
          upsertIsereIntervention(id, it);
        });
      });

    }).catch(e=>console.error('initial sync failed', e));

  // Rhône live
  db.ref('Interventions').on('child_added', snap=>{
    const id = snap.key; const itv = snap.val() || {}; itv.id = id;
    const grouped = buildGroupFromRhône(itv);
    const time = itv.createdAt || itv.dhDebutInter || '';
    const motif = itv.motif || itv.sinistreCourant || '';
    const address = itv.adresse || itv.Adresse || '';
    upsertListItem(id, 'rhone', time, motif, address, grouped);
    upsertRhôneIntervention(id, itv);
  });
  db.ref('Interventions').on('child_changed', snap=>{
    const id = snap.key; const itv = snap.val() || {}; itv.id = id;
    const grouped = buildGroupFromRhône(itv);
    const time = itv.createdAt || itv.dhDebutInter || '';
    const motif = itv.motif || itv.sinistreCourant || '';
    const address = itv.adresse || itv.Adresse || '';
    upsertListItem(id, 'rhone', time, motif, address, grouped);
    upsertRhôneIntervention(id, itv);
  });
  db.ref('Interventions').on('child_removed', snap=>{
    const id = snap.key;
    const el = intervsDiv.querySelector(`.intervention-item[data-id="${id}"][data-source="rhone"]`);
    if (el) { const syn = el.nextElementSibling; el.remove(); if (syn) syn.remove(); }
    if (interventionMarkersRhône[id]) { interventionMarkersRhône[id].remove(); delete interventionMarkersRhône[id]; }
    if (interventionGeoCache[id]) delete interventionGeoCache[id];
    if (interventionGroupsPending[id]) delete interventionGroupsPending[id];
    if (interventionDisplayAddress[id]) delete interventionDisplayAddress[id];
    Object.keys(engagedMap).forEach(k=>{ if (engagedMap[k] === id) delete engagedMap[k]; });
  });

  // Isère live
  db.ref('Isère/Interventions').on('child_added', snap=>{
    const id = snap.key; const itv = snap.val() || {}; itv.id = id;
    const time = itv.dhDebutInter || itv.createdAt || '';
    const motif = itv.sinistreCourant || '';
    const address = itv.Adresse || '';
    upsertListItem(id, 'isere', time, motif, address, {});
    upsertIsereIntervention(id, itv);

    const engRef = db.ref(`Isère/Interventions/${id}/Engins Engagés`);
    engRef.off();
    engRef.on('value', esnap=>{
      const engOrdered = esnap.val() || {};
      const groups = {};
      Object.keys(engOrdered).sort((a,b)=>parseInt(a,10)-parseInt(b,10)).forEach(orderKey=>{
        const centresObj = engOrdered[orderKey] || {};
        Object.entries(centresObj).forEach(([centreName, enginsObj])=>{
          const displayCentre = normalizeCentreName(centreName);
          if (!groups[displayCentre]) groups[displayCentre] = [];
          Object.entries(enginsObj || {}).forEach(([enginName, engData])=>{
            let statut = engData && (engData.Statut ?? engData.statut ?? engData.status) ? (engData.Statut ?? engData.statut ?? engData.status) : '';
            if (displayCentre === 'Sainte-Colombe' && stationData['Sainte-Colombe'] && stationData['Sainte-Colombe'][enginName]) {
              const sd = stationData['Sainte-Colombe'][enginName];
              if (sd && typeof sd === 'object') statut = sd.Statut ?? sd.statut ?? sd.status ?? statut;
              else if (typeof sd === 'string') statut = sd || statut;
            }
            groups[displayCentre].push({ code: enginName, status: String(statut||'').trim() });
            engagedMap[`${displayCentre}_${enginName}`] = id;
          });
        });
      });
      const time2 = itv.dhDebutInter || itv.createdAt || '';
      const motif2 = itv.sinistreCourant || '';
      upsertListItem(id, 'isere', time2, motif2, address, groups);
      interventionGroupsPending[id] = groups;
      if (interventionMarkersIsere[id]) {
        const displayAddr = interventionDisplayAddress[id] || (interventionGeoCache[id] && interventionGeoCache[id].display_name) || itv.Adresse || '';
        const popupHtml = buildPopupHtml(id, `${time2} - ${motif2}`, displayAddr, groups);
        if (interventionMarkersIsere[id].getPopup()) interventionMarkersIsere[id].getPopup().setContent(popupHtml);
      }
    });
  });

  db.ref('Isère/Interventions').on('child_changed', snap=>{
    const id = snap.key; const itv = snap.val() || {}; itv.id = id;
    const item = intervsDiv.querySelector(`.intervention-item[data-id="${id}"][data-source="isere"]`);
    if (item) item.innerHTML = `<strong>${itv.dhDebutInter || itv.createdAt || ''} - ${itv.sinistreCourant || ''}</strong>`;
    upsertIsereIntervention(id, itv);
  });

  db.ref('Isère/Interventions').on('child_removed', snap=>{
    const id = snap.key;
    const el = intervsDiv.querySelector(`.intervention-item[data-id="${id}"][data-source="isere"]`);
    if (el) { const syn = el.nextElementSibling; el.remove(); if (syn) syn.remove(); }
    if (interventionMarkersIsere[id]) { interventionMarkersIsere[id].remove(); delete interventionMarkersIsere[id]; }
    if (interventionGeoCache[id]) delete interventionGeoCache[id];
    if (interventionGroupsPending[id]) delete interventionGroupsPending[id];
    if (interventionDisplayAddress[id]) delete interventionDisplayAddress[id];
    Object.keys(engagedMap).forEach(k=>{ if (engagedMap[k] === id) delete engagedMap[k]; });
  });
}

// ---------- Upsert functions with geocode + groups integration ----------
async function upsertRhôneIntervention(id, payload) {
  if (!id) return;
  try {
    const it = payload || {};
    interventionDataRhône[id] = it;
    const time = it.createdAt || it.dhDebutInter || '';
    const motif = it.motif || it.sinistreCourant || '';
    const address = it.adresse || it.Adresse || '';
    const grouped = buildGroupFromRhône(Object.assign({id}, it));
    if (grouped && Object.keys(grouped).length) interventionGroupsPending[id] = grouped;
    upsertListItem(id, 'rhone', time, motif, address, grouped);

    const cleanedAddrCandidate = address ? address.trim() : '';
    if (!address) { createOrUpdateInterventionMarker('rhone', id, null, null, cleanedAddrCandidate || '', interventionGroupsPending[id]||grouped); return; }

    const geo = await trySmartGeocode(address);
    const displayAddr = (geo && geo._matchedInput) ? geo._matchedInput : cleanedAddrCandidate || (geo && geo.display_name) || address;
    interventionDisplayAddress[id] = displayAddr;

    if (geo) {
      createOrUpdateInterventionMarker('rhone', id, geo.lat, geo.lon, displayAddr, interventionGroupsPending[id]||grouped);
    } else {
      const commune = (address.split(',').slice(-1)[0]||'').trim();
      if (commune) {
        const geoCommune = await geocodeNominatim(commune);
        if (geoCommune) {
          interventionDisplayAddress[id] = displayAddr || `${geoCommune.display_name} (estimation)`;
          createOrUpdateInterventionMarker('rhone', id, geoCommune.lat, geoCommune.lon, interventionDisplayAddress[id], interventionGroupsPending[id]||grouped);
          return;
        }
      }
      createOrUpdateInterventionMarker('rhone', id, null, null, displayAddr, interventionGroupsPending[id]||grouped);
    }
  } catch (err) { console.warn('upsertRhôneIntervention error', id, err); }
}

async function upsertIsereIntervention(id, payload) {
  if (!id) return;
  try {
    const it = payload || {};
    interventionDataIsere[id] = it;
    const time = it.dhDebutInter || it.createdAt || '';
    const motif = it.sinistreCourant || '';
    const address = it.Adresse || '';
    upsertListItem(id, 'isere', time, motif, interventionDisplayAddress[id] || address, interventionGroupsPending[id]||{});

    const cleanedAddrCandidate = address ? address.trim() : '';

    if (!address) { createOrUpdateInterventionMarker('isere', id, null, null, cleanedAddrCandidate || '', interventionGroupsPending[id]||{}); return; }

    const geo = await trySmartGeocode(address);
    const displayAddr = (geo && geo._matchedInput) ? geo._matchedInput : cleanedAddrCandidate || (geo && geo.display_name) || address;
    interventionDisplayAddress[id] = displayAddr;

    if (geo) {
      createOrUpdateInterventionMarker('isere', id, geo.lat, geo.lon, displayAddr, interventionGroupsPending[id]||{});
    } else {
      const commune = (address.split(',').slice(-1)[0]||'').trim();
      if (commune) {
        const geoCommune = await geocodeNominatim(commune);
        if (geoCommune) {
          interventionDisplayAddress[id] = displayAddr || `${geoCommune.display_name} (estimation)`;
          createOrUpdateInterventionMarker('isere', id, geoCommune.lat, geoCommune.lon, interventionDisplayAddress[id], interventionGroupsPending[id]||{});
          return;
        }
      }
      createOrUpdateInterventionMarker('isere', id, null, null, displayAddr, interventionGroupsPending[id]||{});
    }
  } catch (err) { console.warn('upsertIsereIntervention error', id, err); }
}

// ---------- List item upsert ----------
function upsertListItem(id, source, time, motif, address, grouped) {
  let item = intervsDiv.querySelector(`.intervention-item[data-id="${id}"][data-source="${source}"]`);
  let syn;
  if (!item) {
    item = document.createElement('div'); item.className='intervention-item'; item.dataset.id=id; item.dataset.source=source;
    item.innerHTML = `<strong>${time} - ${motif}</strong>`;
    syn = document.createElement('div'); syn.className='interv-synoptic hidden';
    intervsDiv.append(item, syn);

    item.addEventListener('click', ()=>{
      if (!syn._init) {
        syn.innerHTML = '';
        if (address) {
          const titleAddr = document.createElement('div'); titleAddr.style.fontWeight='bold'; titleAddr.style.marginBottom='6px'; titleAddr.style.marginLeft='8px'; titleAddr.textContent='Adresse'; syn.appendChild(titleAddr);
          const pAddr = document.createElement('p'); pAddr.textContent = address; pAddr.style.marginLeft='8px'; pAddr.style.marginTop='4px'; pAddr.style.marginBottom='6px'; syn.appendChild(pAddr);
          const hr = document.createElement('div'); hr.style.borderTop='1px solid #e0e0e0'; hr.style.margin='8px 0'; syn.appendChild(hr);
        }
        const headerRow = document.createElement('div'); headerRow.style.display='flex'; headerRow.style.alignItems='center'; headerRow.style.padding='4px 10px'; headerRow.style.fontWeight='bold';
        const hCentre = document.createElement('div'); hCentre.textContent='Centre'; hCentre.style.flex='0 0 35%'; hCentre.style.maxWidth='35%'; hCentre.style.color='#000'; headerRow.appendChild(hCentre);
        const hEngins = document.createElement('div'); hEngins.textContent='Engins engagés'; hEngins.style.flex='1 1 65%'; hEngins.style.textAlign='left'; hEngins.style.color='#000'; hEngins.style.marginLeft='4%'; headerRow.appendChild(hEngins);
        syn.appendChild(headerRow);
        Object.entries(grouped || {}).forEach(([centre, engs])=>{
          const detail = document.createElement('div'); detail.className='interv-detail'; detail.style.display='flex'; detail.style.alignItems='flex-start'; detail.style.padding='6px 0'; detail.style.columnGap='12px';
          const left = document.createElement('div'); left.textContent=centre; left.style.fontWeight='bold'; left.style.flex='0 0 35%'; left.style.maxWidth='35%'; left.style.color='#000'; left.style.wordBreak='break-word'; left.style.display='flex'; left.style.alignItems='center'; left.style.paddingLeft='8px';
          const right = document.createElement('div'); right.className='vehicles-row'; right.style.flex='1 1 65%'; right.style.display='flex'; right.style.flexWrap='wrap'; right.style.gap='6px';
          (engs||[]).forEach(e=>{ const vb = document.createElement('div'); vb.className=`vehicle ${getStatusClass(e.status)}`; vb.textContent=e.code; right.appendChild(vb); });
          detail.appendChild(left); detail.appendChild(right); syn.appendChild(detail);
        });
        syn._init = true; syn.classList.remove('hidden');
      } else syn.classList.toggle('hidden');
    });

  } else {
    syn = item.nextElementSibling;
    if (syn) {
      syn.innerHTML = '';
      if (address) {
        const titleAddr = document.createElement('div'); titleAddr.style.fontWeight='bold'; titleAddr.style.marginBottom='6px'; titleAddr.style.marginLeft='8px'; titleAddr.textContent='Adresse'; syn.appendChild(titleAddr);
        const pAddr = document.createElement('p'); pAddr.textContent = address; pAddr.style.marginLeft='8px'; pAddr.style.marginTop='4px'; pAddr.style.marginBottom='6px'; syn.appendChild(pAddr);
        const hr = document.createElement('div'); hr.style.borderTop='1px solid #e0e0e0'; hr.style.margin='8px 0'; syn.appendChild(hr);
      }
      const headerRow = document.createElement('div'); headerRow.style.display='flex'; headerRow.style.alignItems='center'; headerRow.style.padding='4px 10px'; headerRow.style.fontWeight='bold';
      const hCentre = document.createElement('div'); hCentre.textContent='Centre'; hCentre.style.flex='0 0 35%'; hCentre.style.maxWidth='35%'; hCentre.style.color='#000'; headerRow.appendChild(hCentre);
      const hEngins = document.createElement('div'); hEngins.textContent='Engins engagés'; hEngins.style.flex='1 1 65%'; hEngins.style.textAlign='left'; hEngins.style.color='#000'; hEngins.style.marginLeft='4%'; headerRow.appendChild(hEngins);
      syn.appendChild(headerRow);
      Object.entries(grouped || {}).forEach(([centre, engs])=>{
        const detail = document.createElement('div'); detail.className='interv-detail'; detail.style.display='flex'; detail.style.alignItems='flex-start'; detail.style.padding='6px 0'; detail.style.columnGap='12px';
        const left = document.createElement('div'); left.textContent=centre; left.style.fontWeight='bold'; left.style.flex='0 0 35%'; left.style.maxWidth='35%'; left.style.color='#000';
        const right = document.createElement('div'); right.className='vehicles-row'; right.style.flex='1 1 65%'; right.style.display='flex'; right.style.flexWrap='wrap'; right.style.gap='6px';
        (engs||[]).forEach(e=>{ const vb = document.createElement('div'); vb.className=`vehicle ${getStatusClass(e.status)}`; vb.textContent=e.code; right.appendChild(vb); });
        detail.appendChild(left); detail.appendChild(right); syn.appendChild(detail);
      });
      syn._init = true;
    }
  }
}

// ---------- Badge -> Map ----------
casernesDiv.addEventListener('click', e=>{
  const el = e.target.closest('.vehicle');
  if (!el) return;
  e.stopPropagation();
  const text = el.textContent.trim();
  const parts = text.split(' : ');
  const stationName = parts.length === 2 ? parts[0] : text.split(' ')[0];
  const code = parts.length === 2 ? parts[1] : text.split(' ').slice(1).join(' ');
  const id = engagedMap[`${stationName}_${code}`];
  if (id) openIntervOnMap(id);
});

// ---------- Tabs & Nav ----------
function showTab(tab) {
  mapDiv.style.display = casernesDiv.style.display = intervsDiv.style.display = 'none';
  btnMap.classList.remove('active'); btnCasernes.classList.remove('active'); btnInterventions.classList.remove('active');
  if (tab==='map') { mapDiv.style.display='block'; btnMap.classList.add('active'); setTimeout(()=>map.invalidateSize(),200); }
  if (tab==='casernes') { casernesDiv.style.display='block'; btnCasernes.classList.add('active'); }
  if (tab==='interventions') { intervsDiv.style.display='block'; btnInterventions.classList.add('active'); }
}
function openCaserne(name) {
  showTab('casernes');
  const item = casernesDiv.querySelector(`.station-item[data-name="${name}"]`);
  if (item) { item.scrollIntoView({behavior:'smooth', block:'center'}); item.click(); }
}
function openIntervention(id) {
  showTab('interventions');
  const item = intervsDiv.querySelector(`.intervention-item[data-id="${id}"]`);
  if (item) { item.scrollIntoView({behavior:'smooth', block:'center'}); item.click(); }
}
function openIntervOnMap(id) {
  showTab('map');
  const mrk = interventionMarkersIsere[id] || interventionMarkersRhône[id];
  if (mrk) { map.setView(mrk.getLatLng(), map.getZoom()); mrk.openPopup(); }
}
btnMap.addEventListener('click', () => showTab('map'));
btnInterventions.addEventListener('click', () => showTab('interventions'));
btnCasernes.addEventListener('click', () => showTab('casernes'));

// ---------- Init ----------
window.addEventListener('DOMContentLoaded', () => {
  initMap();
  initCasernesList();
  subscribeInterventionsList();
  showTab('map');
});
